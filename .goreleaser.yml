version: 2
project_name: slack-cli

builds:
  - id: slack-cli
    main: ./cmd/slack-cli
    binary: slack-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/natikgadzhi/slack-cli/internal/commands.Version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: darwin
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: natikgadzhi
    name: slack-cli

brews:
  - repository:
      owner: natikgadzhi
      name: homebrew-taps
      # Use a dedicated PAT with write access to the taps repo.
      # The default GITHUB_TOKEN cannot push to a different repository.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/natikgadzhi/slack-cli"
    description: "Read-only Slack CLI for fetching messages, threads, and history"
    license: "MIT"
    test: |
      system "#{bin}/slack-cli", "--help"
