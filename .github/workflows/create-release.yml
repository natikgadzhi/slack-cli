name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest tag
        id: last-tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"

      - name: Compute next version
        id: next-version
        run: |
          LAST_TAG="${{ steps.last-tag.outputs.tag }}"
          BUMP="${{ inputs.bump }}"

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (${BUMP} bump from ${LAST_TAG})"

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG="${{ steps.last-tag.outputs.tag }}"
          NEXT_VERSION="${{ steps.next-version.outputs.version }}"

          # Get the date of the last tag, or epoch if no tags exist
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            LAST_TAG_DATE=$(git log -1 --format=%aI "$LAST_TAG")
          else
            LAST_TAG_DATE="1970-01-01T00:00:00+00:00"
          fi

          echo "Generating changelog for PRs merged after $LAST_TAG_DATE"

          # List merged PRs since last release
          PR_LIST=$(gh pr list \
            --state merged \
            --search "merged:>$LAST_TAG_DATE" \
            --json number,title \
            --template '{{range .}}- {{.title}} (#{{.number}}){{"\n"}}{{end}}')

          if [ -z "$PR_LIST" ]; then
            PR_LIST="- No pull requests since last release"
          fi

          {
            echo "## What's Changed in ${NEXT_VERSION}"
            echo ""
            echo "$PR_LIST"
          } > /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Create and push tag
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEXT_VERSION" -F /tmp/changelog.md
          git push origin "$NEXT_VERSION"

          echo "Pushed tag $NEXT_VERSION"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.version }}"
          # GITHUB_TOKEN pushes don't trigger other workflows, so explicitly trigger release
          gh workflow run release.yml --ref "$NEXT_VERSION"
          echo "Triggered release workflow for $NEXT_VERSION"
